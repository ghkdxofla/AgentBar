<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="1024"
  height="1024"
  viewBox="0 0 1024 1024"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">AgentBar Icon</title>
  <desc id="desc">Minimal rounded icon with three clean usage bars.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0B2233"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Outer shell -->
  <rect x="80" y="80" width="864" height="864" rx="220" fill="url(#bg)"/>
  <rect x="80" y="80" width="864" height="864" rx="220" fill="none" stroke="#E2E8F0" stroke-opacity="0.16" stroke-width="4"/>

  <!-- Inner panel -->
  <rect
    x="184"
    y="208"
    width="656"
    height="608"
    rx="88"
    fill="#061220"
    fill-opacity="0.72"
    stroke="#E2E8F0"
    stroke-opacity="0.18"
    stroke-width="4"
    filter="url(#softShadow)"
  />

  <!-- Header rail -->
  <rect x="240" y="264" width="400" height="24" rx="12" fill="#E2E8F0" fill-opacity="0.18"/>
  <circle cx="686" cy="276" r="9" fill="#10B981"/>

  <!-- Three clean usage bars -->
  <circle cx="262" cy="390" r="18" fill="#10B981"/>
  <rect x="300" y="366" width="468" height="48" rx="24" fill="url(#accent)"/>

  <circle cx="262" cy="510" r="18" fill="#F59E0B"/>
  <rect x="300" y="486" width="372" height="48" rx="24" fill="#F59E0B"/>

  <circle cx="262" cy="630" r="18" fill="#3B82F6"/>
  <rect x="300" y="606" width="292" height="48" rx="24" fill="#3B82F6"/>
</svg>
