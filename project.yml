name: AgentBar
options:
  bundleIdPrefix: com.agentbar
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "26.2"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  AgentBar:
    type: application
    platform: macOS
    sources:
      - path: AgentBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentbar.app
        INFOPLIST_FILE: AgentBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: AgentBar/AgentBar.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_STRICT_CONCURRENCY: complete

  AgentBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AgentBarTests
    dependencies:
      - target: AgentBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentbar.app.tests
        GENERATE_INFOPLIST_FILE: YES
