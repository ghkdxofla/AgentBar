name: CCUsageBar
options:
  bundleIdPrefix: com.ccusagebar
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "26.2"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  CCUsageBar:
    type: application
    platform: macOS
    sources:
      - path: CCUsageBar
    dependencies:
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ccusagebar.app
        INFOPLIST_FILE: CCUsageBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: CCUsageBar/CCUsageBar.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_STRICT_CONCURRENCY: complete

  CCUsageBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CCUsageBarTests
    dependencies:
      - target: CCUsageBar
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ccusagebar.app.tests
        GENERATE_INFOPLIST_FILE: YES
