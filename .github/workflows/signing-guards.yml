name: Signing Guards

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  signing-guards:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Verify signing matrix
        run: bash scripts/check-signing-matrix.sh

      - name: Test signing verifier parser
        run: bash scripts/test-verify-release-signing.sh
