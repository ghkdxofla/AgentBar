name: Build and Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Prevent concurrent runs on the same branch to avoid artifact conflicts
# and wasted runner minutes from redundant builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, Test, and Package
    runs-on: macos-15

    steps:
      # -----------------------------------------------------------------------
      # 1. Source
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # -----------------------------------------------------------------------
      # 2. Toolchain
      # -----------------------------------------------------------------------
      - name: Select Xcode
        # macos-15 ships with Xcode 16.x at /Applications/Xcode.app.
        # Pinning explicitly keeps the path deterministic if the runner ever
        # has multiple Xcode installations side-by-side.
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode and SDK versions
        run: |
          xcode-select --print-path
          xcodebuild -version
          xcodebuild -showsdks

      # -----------------------------------------------------------------------
      # 3. Generate scheme via XcodeGen
      #
      # The project uses XcodeGen (project.yml) to generate xcodeproj.
      # Schemes are not checked into source control, so we regenerate them
      # in CI to ensure test plans are properly attached.
      # -----------------------------------------------------------------------
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # -----------------------------------------------------------------------
      # 4. Cache – DerivedData
      # -----------------------------------------------------------------------
      - name: Cache DerivedData
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.1
        with:
          path: build
          key: deriveddata-${{ runner.os }}-${{ hashFiles('project.yml') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      # -----------------------------------------------------------------------
      # 5. Test – all tests in AgentBarTests target
      #
      # CODE_SIGN_* overrides disable signing entirely so the runner does not
      # need a Developer ID certificate or provisioning profile.
      # -----------------------------------------------------------------------
      - name: Run full test suite
        run: |
          xcodebuild test \
            -project AgentBar.xcodeproj \
            -scheme AgentBar \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath build \
            -quiet \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # -----------------------------------------------------------------------
      # 6. Build – Release configuration
      # -----------------------------------------------------------------------
      - name: Build Release
        run: |
          xcodebuild build \
            -project AgentBar.xcodeproj \
            -scheme AgentBar \
            -configuration Release \
            -derivedDataPath build \
            -quiet \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # -----------------------------------------------------------------------
      # 6. Package – zip the .app for artifact upload
      #
      # ditto preserves macOS-specific metadata (resource forks, extended
      # attributes) better than plain zip when round-tripping on macOS.
      # -----------------------------------------------------------------------
      - name: Zip AgentBar.app
        run: |
          ditto -c -k --keepParent \
            build/Build/Products/Release/AgentBar.app \
            AgentBar.app.zip

      # -----------------------------------------------------------------------
      # 7. Package – create distributable DMG
      #
      # UDZO = zlib-compressed read-only image, widely compatible and
      # smaller than uncompressed formats.
      # -----------------------------------------------------------------------
      - name: Create DMG
        run: |
          hdiutil create \
            -volname AgentBar \
            -srcfolder build/Build/Products/Release/AgentBar.app \
            -ov \
            -format UDZO \
            AgentBar.dmg

      # -----------------------------------------------------------------------
      # 8. Upload artifacts
      #
      # Both the zipped .app and the .dmg are retained for 30 days so that
      # releases can be assembled without re-running the workflow.
      # -----------------------------------------------------------------------
      - name: Upload AgentBar.app (zip)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: AgentBar-app-${{ github.sha }}
          path: AgentBar.app.zip
          retention-days: 30
          if-no-files-found: error

      - name: Upload AgentBar.dmg
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: AgentBar-dmg-${{ github.sha }}
          path: AgentBar.dmg
          retention-days: 30
          if-no-files-found: error
